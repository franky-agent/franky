name: Pull Request

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write # for checkout
  pull-requests: write # for updating pr

jobs:
  build:
    name: Build
    if: github.event.pull_request.head.repo.full_name == github.repository
    permissions:
      contents: write
      pull-requests: write
    uses: containifyci/.github/.github/workflows/pull-request.yml@v1
    secrets: inherit

  build-fork:
    name: Build (fork PR)
    if: github.event.pull_request.head.repo.full_name != github.repository
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:
      - name: Verify fork head commit is reachable
        env:
          HEAD_REPO: ${{ github.event.pull_request.head.repo.full_name }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          status=$(curl -sS -o /tmp/head-commit.json -w "%{http_code}" \
            -u "x-access-token:${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${HEAD_REPO}/commits/${HEAD_SHA}")
          if [ "${status}" != "200" ]; then
            echo "::error::Fork head commit ${HEAD_SHA} is no longer reachable in ${HEAD_REPO}."
            echo "::error::This usually means the fork branch or commit was deleted/rewritten. Push the branch again or update the PR head and re-run CI."
            cat /tmp/head-commit.json
            exit 1
          fi

      - name: Checkout fork head commit
        uses: actions/checkout@v6
        with:
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Install engine-ci binary
        env:
          ENGINE_CI_VERSION: v0.42.9
          ENGINE_CI_SHA256: 22ce827b2d95105f0a9572ebe85449c1c72904a7c981c3cd60ba2a7ff89d7809
        run: |
          curl -fsSL -o /tmp/engine-ci \
            "https://github.com/containifyci/engine-ci/releases/download/${ENGINE_CI_VERSION}/engine-ci_linux_x86_64"
          echo "${ENGINE_CI_SHA256}  /tmp/engine-ci" | sha256sum -c -
          mkdir -p "${HOME}/.local/bin"
          install -m 0755 /tmp/engine-ci "${HOME}/.local/bin/engine-ci"
          echo "${HOME}/.local/bin" >> "${GITHUB_PATH}"

      - name: Run fork build with ContainifyCI
        env:
          CONTAINER_RUNTIME: docker
          DOCKER_USER: containifyci
          CONTAINIFYCI_GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CONTAINIFYCI_FILE: .containifyci/containifyci.go
        run: |
          engine-ci github_actions
          engine-ci engine
