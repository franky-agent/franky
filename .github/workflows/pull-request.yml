name: Pull Request

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write # for checkout
  pull-requests: write # for updating pr

jobs:
  build:
    name: Build
    if: github.event.pull_request.head.repo.full_name == github.repository
    permissions:
      contents: write
      pull-requests: write
    uses: containifyci/.github/.github/workflows/pull-request.yml@v1
    secrets: inherit

  build-fork:
    name: Build (fork PR)
    if: github.event.pull_request.head.repo.full_name != github.repository
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:
      - name: Verify fork head commit is reachable
        env:
          HEAD_REPO: ${{ github.event.pull_request.head.repo.full_name }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          if ! git ls-remote "https://github.com/${HEAD_REPO}.git" "${HEAD_SHA}" | grep -q "${HEAD_SHA}"; then
            echo "::error::Fork head commit ${HEAD_SHA} is no longer reachable in ${HEAD_REPO}."
            exit 1
          fi

      - name: Checkout fork head commit
        uses: actions/checkout@v6
        with:
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Install engine-ci binary
        uses: jaxxstorm/action-install-gh-release@25e24d2d23ae098373794ef1d6faecb48ee52da8 # v3.0.0
        with:
          repo: containifyci/engine-ci
          cache: true
          extension-matching: disable
          rename-to: engine-ci
          chmod: 0755

      - name: Run fork build with ContainifyCI
        env:
          CONTAINER_RUNTIME: docker
          DOCKER_USER: containifyci
          CONTAINIFYCI_GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CONTAINIFYCI_FILE: .containifyci/containifyci.go
        run: |
          engine-ci github_actions
          engine-ci engine
