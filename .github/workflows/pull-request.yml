name: Pull Request

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write # for checkout
  pull-requests: write # for updating pr

jobs:
  build:
    name: Build
    if: github.event.pull_request.head.repo.full_name == github.repository
    permissions:
      contents: write
      pull-requests: write
    uses: containifyci/.github/.github/workflows/pull-request.yml@v1
    secrets: inherit

  build-fork:
    name: Build (fork PR)
    if: github.event.pull_request.head.repo.full_name != github.repository
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:
      - name: Skip ContainifyCI build on fork PRs
        run: |
          echo "ContainifyCI reusable workflow checks out github.head_ref in the base repo."
          echo "Fork PR head branches live in a different repository, so that checkout fails."
          echo "This fallback marks the build check as non-failing for fork PRs."
